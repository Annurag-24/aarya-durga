name: cPanel CI/CD

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: cpanel-deploy-${{ github.ref }}
    cancel-in-progress: true

env:
    FRONTEND_DIR: aarya-durga-frontend
    BACKEND_DIR: aarya-durga-backend
    FRONTEND_URL: https://aarya-durga.demosystem.in
    BACKEND_URL: https://api.aarya-durga.demosystem.in
    VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.aarya-durga.demosystem.in/api' }}
    CPANEL_HOST: ${{ secrets.CPANEL_HOST || '9.12.109.208' }}
    CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME || 'demosystem' }}
    CPANEL_FRONTEND_PATH: ${{ secrets.CPANEL_FRONTEND_PATH || '/public_html/aarya-durga/aarya-durga-frontend/dist' }}
    CPANEL_BACKEND_PATH: ${{ secrets.CPANEL_BACKEND_PATH || '/public_html/aarya-durga/aarya-durga-backend' }}
    SSH_PORT: ${{ secrets.CPANEL_SSH_PORT || '22' }}

jobs:
    frontend-build:
        name: Build Frontend
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: aarya-durga-frontend/package-lock.json

            - name: Install frontend dependencies
              working-directory: ${{ env.FRONTEND_DIR }}
              run: npm ci

            - name: Build frontend
              working-directory: ${{ env.FRONTEND_DIR }}
              env:
                  VITE_API_URL: ${{ env.VITE_API_URL }}
              run: |
                  npm run build

            - name: Upload frontend artifact
              uses: actions/upload-artifact@v4
              with:
                  name: frontend-dist
                  path: aarya-durga-frontend/dist/
                  if-no-files-found: error
                  retention-days: 7

    backend-build:
        name: Build Backend
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.2
                  tools: composer:v2
                  coverage: none

            - name: Install backend dependencies
              working-directory: ${{ env.BACKEND_DIR }}
              run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader --no-dev

            - name: Pack backend release
              run: |
                  tar -czf backend-release.tar.gz \
                    --exclude='.env' \
                    --exclude='.env.*' \
                    --exclude='storage/*' \
                    --exclude='node_modules' \
                    --exclude='.git' \
                    -C "${BACKEND_DIR}" .

            - name: Upload backend artifact
              uses: actions/upload-artifact@v4
              with:
                  name: backend-release
                  path: backend-release.tar.gz
                  if-no-files-found: error
                  retention-days: 7

    deploy:
        name: Deploy To cPanel
        runs-on: ubuntu-latest
        needs:
            - frontend-build
            - backend-build

        steps:
            - name: Download frontend artifact
              uses: actions/download-artifact@v4
              with:
                  name: frontend-dist
                  path: frontend-dist

            - name: Download backend artifact
              uses: actions/download-artifact@v4
              with:
                  name: backend-release
                  path: backend-release

            - name: Extract backend artifact
              run: |
                  mkdir -p backend-deploy
                  tar -xzf backend-release/backend-release.tar.gz -C backend-deploy

            - name: Validate required secrets
              env:
                  CPANEL_SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
              run: |
                  for value in \
                    "$CPANEL_SSH_PRIVATE_KEY"; do
                    if [ -z "$value" ]; then
                      echo "One or more required deploy secrets are missing."
                      exit 1
                    fi
                  done

            - name: Configure SSH
              env:
                  CPANEL_HOST: ${{ env.CPANEL_HOST }}
                  CPANEL_SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
              run: |
                  mkdir -p ~/.ssh
                  printf '%s\n' "$CPANEL_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  ssh-keyscan -p "$SSH_PORT" -H "$CPANEL_HOST" >> ~/.ssh/known_hosts

            - name: Ensure remote deploy directories exist
              env:
                  CPANEL_HOST: ${{ env.CPANEL_HOST }}
                  CPANEL_USERNAME: ${{ env.CPANEL_USERNAME }}
                  CPANEL_FRONTEND_PATH: ${{ env.CPANEL_FRONTEND_PATH }}
                  CPANEL_BACKEND_PATH: ${{ env.CPANEL_BACKEND_PATH }}
              run: |
                  ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$CPANEL_USERNAME@$CPANEL_HOST" \
                    "mkdir -p '$CPANEL_FRONTEND_PATH' '$CPANEL_BACKEND_PATH'"

            - name: Deploy frontend files
              env:
                  CPANEL_HOST: ${{ env.CPANEL_HOST }}
                  CPANEL_USERNAME: ${{ env.CPANEL_USERNAME }}
                  CPANEL_FRONTEND_PATH: ${{ env.CPANEL_FRONTEND_PATH }}
              run: |
                  rsync -az --delete \
                    -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
                    frontend-dist/ \
                    "$CPANEL_USERNAME@$CPANEL_HOST:$CPANEL_FRONTEND_PATH/"

            - name: Deploy backend files
              env:
                  CPANEL_HOST: ${{ env.CPANEL_HOST }}
                  CPANEL_USERNAME: ${{ env.CPANEL_USERNAME }}
                  CPANEL_BACKEND_PATH: ${{ env.CPANEL_BACKEND_PATH }}
              run: |
                  rsync -az --delete \
                    --exclude='.env' \
                    --exclude='storage/*' \
                    --exclude='bootstrap/cache/*' \
                    -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT" \
                    backend-deploy/ \
                    "$CPANEL_USERNAME@$CPANEL_HOST:$CPANEL_BACKEND_PATH/"

            - name: Run Laravel post-deploy tasks
              env:
                  CPANEL_HOST: ${{ env.CPANEL_HOST }}
                  CPANEL_USERNAME: ${{ env.CPANEL_USERNAME }}
                  CPANEL_BACKEND_PATH: ${{ env.CPANEL_BACKEND_PATH }}
              run: |
                  ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$CPANEL_USERNAME@$CPANEL_HOST" <<EOF
                    set -e
                    cd "$CPANEL_BACKEND_PATH"

                    if [ ! -f .env ]; then
                      echo ".env was not found at $CPANEL_BACKEND_PATH."
                      echo "Create .env once on the server, then rerun this workflow."
                      exit 1
                    fi

                    mkdir -p storage/framework/cache/data
                    mkdir -p storage/framework/sessions
                    mkdir -p storage/framework/views
                    mkdir -p storage/logs

                    php artisan migrate --force
                    php artisan config:cache
                    php artisan view:cache
                    php artisan storage:link || true
                    chmod -R ug+rwx storage bootstrap/cache || true
                  EOF
